[[sections]]
title = "Designing dependable autonomy systems for real farms across Australia."
description = "I am a Principal Autonomy Specialist and Customer Systems Lead at Agri Automation Australia, working at the intersection of robotics, agricultural engineering, and edge‑native software infrastructure. I design production‑ready autonomy systems that deliver reliable operation, reduce labour pressure, and perform consistently within tight weather and timing windows. My work spans high‑precision GNSS navigation, row‑to‑row route architecture, connectivity and telemetry systems, and Web/Cloud API integrations that link robots to real farm workflows. I take a disciplined, systems‑engineering approach; anticipating failure modes, validating performance, and ensuring autonomy behaves predictably in real‑world conditions."
direction = "column"
item_style = "outline"
icon_size = "30px"
