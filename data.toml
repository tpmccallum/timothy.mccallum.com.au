title = "Contact Me"
description = "I am a renaissance developer operating at the intersection of software architecture and agricultural autonomy. With foundations in both automotive engineering and advanced software development, I design resilient, production-grade systems for real-world field environments and lead teams toward reliable, measurable operational performance."
